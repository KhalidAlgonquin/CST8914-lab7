<!DOCTYPE html>
<html lang="en">

<head>
  <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
  <meta charset="utf-8">
  <style>
    .control,
    fieldset {
      margin: 6px 0;
    }

    label {
      display: inline-block;
      width: 120px;
      vertical-align: top;
    }

    input+label {
      width: auto;
    }

    .error,
    .required {
      color: red;
    }

    fieldset ul {
      margin: 0;
    }
  </style>
</head>

<body>
  <h1>Feedback form</h1>
  <form>
    <!--Add labels association with inputs -->
    <div class="control">
      <label for="name">Full name (required) </label>
      <input id="name" name="name" type="text" />
    </div>
    <div class="control">
      <label for="biography">Biography</label>
      <textarea id="biography" name="biography" type="text"></textarea>
      <span>Include examples on your skills in JavaScript.</span>
    </div>

    <div>Gender</div>
    <div class="control">
      <input id="gender_male" name="gender" type="radio" value="male" />
      <label for="gender_male">Male</label>
    </div>
    <div class="control">
      <input id="gender_female" name="gender" type="radio" value="female" />
      <label for="gender_female">Female</label>
    </div>

    <div class="control">
      <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" />
      <label for="accept_agbs">I accept the terms and conditions</label>
    </div>
    <div class="control">
      <input name="validate" type="hidden" value="1" />
      <input type="submit" value="Register" />
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"
    integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
  <script>"use strict";

    ;
    (function () {
      var validateInput;

      $.urlParam = function (name) {
        var results;
        results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);

        if (results === null) {
          return null;
        } else {
          return decodeURI(results[1]) || null;
        }
      };

      validateInput = function validateInput(input, message) {
        var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;
        $input = $('[name="' + input + '"]');

        if ((value = $.urlParam(input)) === null) {
          if ($('fieldset.errors').length === 0) {
            $('form').prepend('<fieldset class="errors"><legend>Errors</legend><ul></ul></fieldset>');
          }

          $referencedElement = null;
          $elementToDescribe = null;
          $errorContainer = $('fieldset.errors ul');

          if ($input.is(':radio')) {
            $fieldset = $input.closest('fieldset');
            $elementToDescribe = $fieldset;
            $referencedElement = $input.filter(':first');
          } else {
            $elementToDescribe = $input;
            $referencedElement = $input;
          }

          // Make the error a real link that targets invalid field and focus it on click
          $error = $('<a href="#' + $referencedElement.attr('id') + '">' + message + '</a>');
          $error.click(function (e) {
            // Keep focusing
            $referencedElement.focus();
            return e.preventDefault();
          });
          $elementToDescribe.attr('aria-describedby', input + '_description');
          $errorContainer.append('<li>').find('li:last').append($error);

          // See https://stackoverflow.com/questions/46134247/jquery-setting-focus-doesnt-work-in-ie11/
          if ($(':not(form):focus').length === 0) {
            // Move focus to the error summary
            $('fieldset.errors').attr('tabindex', '-1').focus();
          }
        } else {
          if ($input.is(':checkbox')) {
            $input.attr('checked', true);
          }

          if ($input.is(':radio')) {
            return $input.filter('[value="' + value + '"]').attr('checked', true);
          } else {
            return $input.val(value);
          }
        }
      };

      $(document).ready(function () {
        // Keep existing URL-based validation if needed
        if ($.urlParam('validate')) {
          validateInput('name', 'Please enter your name!');
          validateInput('biography', 'Please tell us something about your history!');
          validateInput('gender', 'Please tell us your gender!');
          validateInput('accept_agbs', 'You must accept our terms and conditions!');
        }

        // Validate on submit using actual current values
        $('form').on('submit', function (e) {
          e.preventDefault();

          // Remove old errors from previous submit attempts
          $('fieldset.errors').remove();
          $('[aria-describedby$="_description"]').removeAttr('aria-describedby');
          $('.error').remove();

          // Check the real form values
          var ok =
            $.trim($('[name="name"]').val()) !== '' &&
            $.trim($('[name="biography"]').val()) !== '' &&
            $('[name="gender"]:checked').length > 0 &&
            $('[name="accept_agbs"]').is(':checked');

          if (!ok) {
            // Reuse existing validateInput to show the same top errors + links
            if ($.trim($('[name="name"]').val()) === '') validateInput('name', 'Please enter your name!');
            if ($.trim($('[name="biography"]').val()) === '') validateInput('biography', 'Please tell us something about your history!');
            if ($('[name="gender"]:checked').length === 0) validateInput('gender', 'Please tell us your gender!');
            if (!$('[name="accept_agbs"]').is(':checked')) validateInput('accept_agbs', 'You must accept our terms and conditions!');

            // Focus the error summary after errors are created
            if ($('fieldset.errors').length) {
              $('fieldset.errors').attr('tabindex', '-1').focus();
            }
            return;
          }
          // Display success message window if all inputs are valid
          alert('All inputs are valid.');
        });
      });
    }).call(void 0);</script>

</body>

</html>
